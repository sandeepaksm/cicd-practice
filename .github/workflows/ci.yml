name: My First Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  job1:
    runs-on: ubuntu-latest
    steps:
      - name: Job 1 running
        run: |
          echo "I am Job 1"
          sleep 3
          echo "Job 1 done"

  job2:
    runs-on: ubuntu-latest
    steps:
      - name: Job 2 running
        run: |
          echo "I am Job 2"
          sleep 3
          echo "Job 2 done"

  job3:
    runs-on: ubuntu-latest
    needs: [job1, job2]
    steps:
      - name: Job 3 running
        run: |
          echo "Job 1 and Job 2 finished"
          echo "Now I can run Job 3"
